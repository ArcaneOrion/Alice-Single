[tool.pytest.ini_options]
# Pytest 配置文件

# 最小 Python 版本
minversion = "7.0"

# 测试文件匹配模式
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# 测试路径
testpaths = ["backend/tests"]

# 命令行选项
addopts = [
    "-ra",                    # 显示摘要信息
    "-q",                     # 简化输出
    "--strict-markers",       # 严格标记模式
    "--tb=short",             # 简短的 traceback
    "--disable-warnings",     # 禁用警告
]

# 标记定义
markers = [
    "unit: 单元测试",
    "integration: 集成测试",
    "slow: 慢速测试",
    "docker: 需要 Docker 的测试",
]

# 日志配置
log_cli = false
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"

# 覆盖率配置
[tool.coverage.run]
source = ["backend/alice"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/site-packages/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
